name: acutework
description: "Acutework — Safety alerts for medical practitioners."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.2

  # Networking
  dio: ^5.5.0+1
  retrofit: ^4.4.1
  pretty_dio_logger: ^1.4.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.4

  # Models / serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # DI / utils
  get_it: ^9.2.1
  dartz: ^0.10.1
  intl: ^0.20.2
  logger: ^2.4.0
  connectivity_plus: ^7.1.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  pinput: ^6.0.2
  shimmer: ^3.0.0

  # Permissions / device
  permission_handler: ^12.0.1
  geolocator: ^14.0.2

  # Notifications
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  very_good_analysis: ^10.2.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  retrofit_generator: ^10.2.5
  riverpod_generator: ^4.0.3

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
